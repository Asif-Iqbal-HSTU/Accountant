services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: accountant-web
    container_name: accountant-web-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://dockland.proconsulting.ai
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage:/var/www/html/storage
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
    networks:
      - proconsulting_network

  caddy:
    image: caddy:alpine
    container_name: accountant-web-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - proconsulting_caddy_data:/data
      - proconsulting_caddy_config:/config
    depends_on:
      - app
    networks:
      - proconsulting_network

networks:
  proconsulting_network:
    driver: bridge

volumes:
  proconsulting_caddy_data:
  proconsulting_caddy_config:
